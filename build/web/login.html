<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Talent-Archive</title>
    <style>
        :root {
            --primary-purple: #2E0854;
            --accent-gold: #D4AF37;
            --bg-color: #F4F4F9;
            --white: #FFFFFF;
            --text-main: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border-top: 5px solid var(--accent-gold);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h2 {
            color: var(--primary-purple);
            margin: 0 0 10px 0;
            font-size: 1.8rem;
        }

        .login-header p {
            color: #666;
            margin: 0;
            font-size: 0.9rem;
        }

        .error-message {
            background-color: #ffe6e6;
            color: #d93025;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none; /* Toggle this via JS/Backend when error occurs */
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-purple);
            box-shadow: 0 0 5px rgba(46, 8, 84, 0.2);
        }

        .login-btn {
            width: 100%;
            background-color: var(--primary-purple);
            color: var(--white);
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-btn:hover {
            background-color: var(--accent-gold);
            color: var(--primary-purple);
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .register-link a {
            color: var(--primary-purple);
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            color: var(--accent-gold);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h2>Talent-Archive</h2>
            <p>Cultural & Arts Directory</p>
        </div>

        <div class="error-message" id="errorArea">
            Invalid email or password. Please try again.
        </div>

        <form action="dashboard.html" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

</body>
</html>
