<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard - Talentt-Archive</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="app-layout">

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="sidebar-header">
            <h2>Talentt-Archive</h2>
            <p>Cultural & Arts Directory</p>
        </div>

        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="assets.html">Assets</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="logout.html">Logout</a></li>
        </ul>

    </div>

    <!-- Main Content -->
    <div class="main-content">

        <div class="topbar">
            <h2>Dashboard Overview</h2>
        </div>

        <div class="page-content">

            <!-- Statistics Cards -->
            <div class="card">
                <h3>Quick Statistics</h3>

                <table>
                    <tr>
                        <th>Total Students</th>
                        <th>Total Portfolios</th>
                        <th>Total Assets</th>
                        <th>Assets Under Maintenance</th>
                    </tr>

                    <tr>
                        <td>1,245</td>
                        <td>865</td>
                        <td>342</td>
                        <td>18</td>
                    </tr>
                </table>
            </div>

            <!-- Talent Distribution -->
            <div class="card">

                <h3>Talent Distribution</h3>

                <canvas id="talentPieChart"></canvas>

            </div>

            <!-- Asset Status -->
            <div class="card">

                <h3>Asset Maintenance Status</h3>

                <canvas id="assetBarChart"></canvas>

            </div>

        </div>

    </div>

    <script>

        // Talent Distribution Pie Chart

        const pieCtx =
            document.getElementById('talentPieChart');

        new Chart(pieCtx, {

            type: 'pie',

            data: {

                labels: [
                    'Choir',
                    'Dance',
                    'Theatre',
                    'Traditional Music',
                    'Visual Arts'
                ],

                datasets: [{
                    data: [25, 30, 15, 20, 10],

                    backgroundColor: [
                        '#2E0854',
                        '#D4AF37',
                        '#6B2D9E',
                        '#E5C765',
                        '#1B0433'
                    ]
                }]
            },

            options: {
                responsive: true
            }

        });

        // Asset Maintenance Bar Chart

        const barCtx =
            document.getElementById('assetBarChart');

        new Chart(barCtx, {

            type: 'bar',

            data: {

                labels: [
                    'Good Condition',
                    'Under Maintenance',
                    'Damaged'
                ],

                datasets: [{

                    label: 'Assets',

                    data: [280, 18, 5],

                    backgroundColor: [
                        '#2E0854',
                        '#D4AF37',
                        '#D93025'
                    ]
                }]
            },

            options: {

                responsive: true,

                scales: {
                    y: {
                        beginAtZero: true
                    }
                }

            }

        });

    </script>

</body>
</html>
